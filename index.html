<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Polla Mundial 2026 Empresarial</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
<h1>Polla Mundial 2026 - Versión Empresarial</h1>
<input type="text" id="buscador" placeholder="Buscar participante...">
</header>

<section>
<h2 id="nombreParticipante"></h2>
<h3>Total Puntos: <span id="totalPuntos">0</span></h3>
</section>

<table id="tablaPartidos">
<thead>
<tr>
<th>Fecha</th>
<th>Partido</th>
<th>Resultado Oficial</th>
<th>Pronóstico</th>
<th>Puntos</th>
</tr>
</thead>
<tbody></tbody>
</table>

<section>
<h2>Ranking General</h2>
<table id="ranking">
<thead>
<tr><th>#</th><th>Nombre</th><th>Puntos</th></tr>
</thead>
<tbody></tbody>
</table>
</section>

<script src="js/app.js"></script>
</body>
</html>
